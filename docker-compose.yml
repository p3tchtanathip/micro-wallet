services:
  gateway:
    image: nginx:1-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

  frontend:
    build: ./frontend
    environment:
      - NEXTAUTH_URL=http://localhost
      - NEXTAUTH_URL_INTERNAL=http://frontend:3000
      - NEXT_PUBLIC_API_URL=/api
      - BACKEND_API_URL=http://backend:8080/api
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}

  backend:
    build: ./backend
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=microwallet_db;Username=user;Password=password
      - ConnectionStrings__Redis=redis:6379
      - FrontendUrl=http://localhost
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      - db
      - redis

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: microwallet_db
    expose:
      - "5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  db_data:
  redis_data:
